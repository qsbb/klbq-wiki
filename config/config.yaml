# 卡拉彼丘 Wiki 查询插件配置
# 修改后重启 Yunzai 生效

# 【生日查询】返回角色数量（1-20）
birthday_count: 5

# 【功能开关】将查询结果渲染为图片
# 默认开启，所有查询优先发送图片卡片；关闭后直接发送文字
render_image: true

# 【喵言喵语】使用图片发送
# 默认关闭，关闭时原样发送文字；开启后尝试生成图片，失败时回退文字
cat_language_image: false

# 【详情链接】发送 Wiki 链接
# 默认关闭：单独发送 Wiki 链接可能触发其他插件（如 lin-plugin 复读只因）的 bug
# 图片卡片已包含完整资料，链接非必需。如需开启请设为 true
send_detail_link: false

# 【图片渲染】超时时间（秒，1-60）
image_timeout: 8

# 【图片渲染】失败或超时后回退文字
text_fallback: true

# 【图片布局】每行格子数（1-4，推荐手机查看使用 2）
grid_columns: 2

# 【图片布局】卡片最小宽度（像素，420-1200）
card_width: 760

# 【插件更新】更新成功后自动重启 Yunzai（需 PM2 等进程管理器）
# 默认开启：更新完成后自动重启以加载新代码
# 关闭后更新完成仅提示用户手动重启
# 采用 Yunzai 官方重启机制：redis 设置 Yz:restart 标记 + process.exit
# 若直接运行 node app.js 未使用 PM2，进程退出后需手动重新启动
auto_restart: true

# 【插件更新】自动重启前等待秒数（1-30）
# 确保更新成功的提示消息发送完成后再重启
restart_delay: 3

# 【别名】自定义别名映射
# 每行一条，格式：别名=页面标题，例如：心夏老师=心夏
custom_aliases: ''
