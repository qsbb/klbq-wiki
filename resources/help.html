<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; min-width: 0; min-height: 0; background: #10182f; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; overflow: hidden; }
body { display: block; }
.klbq-card { width: 100%; min-width: {{card_width}}px; position: relative; overflow: hidden; padding: 34px; color: #edf7ff; background: linear-gradient(135deg, #10182f 0%, #182a55 48%, #5d3ca0 100%); }
.glow { position: absolute; right: -100px; top: -120px; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(118, 221, 255, .48), rgba(118, 221, 255, 0) 68%); }
.header { position: relative; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.tag { display: inline-block; padding: 7px 14px; border-radius: 999px; background: rgba(255, 255, 255, .14); color: #aee9ff; font-size: 20px; letter-spacing: 1px; }
.title { margin-top: 12px; font-size: 46px; font-weight: 800; text-shadow: 0 4px 16px rgba(0, 0, 0, .28); }
.subtitle { margin-top: 8px; color: #c6d5ff; font-size: 22px; }
.group { position: relative; margin-bottom: 22px; }
.group-title { font-size: 24px; font-weight: 700; color: #aee9ff; margin-bottom: 12px; padding-left: 14px; border-left: 4px solid #76ddff; }
.cmd-list { display: flex; flex-direction: column; gap: 8px; }
.cmd-item { display: flex; padding: 12px 16px; border-radius: 12px; background: rgba(255, 255, 255, .10); border: 1px solid rgba(255, 255, 255, .10); align-items: center; min-width: 0; }
.cmd-name { color: #ffffff; font-size: 20px; font-weight: 600; flex-shrink: 0; word-break: break-all; overflow-wrap: anywhere; }
.cmd-desc { color: #c6d5ff; font-size: 19px; line-height: 1.4; margin-left: 14px; min-width: 0; flex: 1; word-break: break-all; overflow-wrap: anywhere; }
.cmd-value { color: #fff2a8; font-size: 19px; font-weight: 600; margin-left: 12px; flex-shrink: 0; }
.footer { position: relative; margin-top: 12px; color: rgba(237, 247, 255, .62); font-size: 16px; text-align: right; }
</style>
</head>
<body>
<div id="container" class="klbq-card">
  <div class="glow"></div>
  <div class="header">
    <div>
      <div class="tag">卡拉彼丘 Wiki</div>
      <div class="title">{{title}}</div>
      <div class="subtitle">{{kind}}</div>
    </div>
  </div>
  {{each groups}}
  <div class="group">
    <div class="group-title">{{$value.name}}</div>
    <div class="cmd-list">
      {{each $value.items}}
      <div class="cmd-item">
        <div class="cmd-name">{{$value.name}}</div>
        {{if $value.desc}}<div class="cmd-desc">{{$value.desc}}</div>{{/if}}
        {{if $value.value}}<div class="cmd-value">{{$value.value}}</div>{{/if}}
      </div>
      {{/each}}
    </div>
  </div>
  {{/each}}
  <div class="footer">Generated by klbq-wiki for Yunzai</div>
</div>
</body>
</html>
